channel: feishu
connection_mode: websocket

defaults:
  dmPolicy: open
  groupPolicy: open
  requireMention: true
  allowFrom:
    - "*"

bindings:
  - accountId: default
    agentId: main

  - accountId: stockbot
    agentId: stock-agent

  - accountId: educationbot
    agentId: education-agent

  - accountId: loanbot
    agentId: loan-agent

  - accountId: socialbot
    agentId: social-media-agent

  - accountId: newsbot
    agentId: news-agent

  - accountId: salesbot
    agentId: sales-agent
