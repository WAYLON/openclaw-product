id: legal-agent
name: 法务 / 合同流程 Agent
package_name: 法务合同流程专业包
language: zh-CN
model:
  provider: codex
  model: GPT-5.4
  reasoning_effort: high
  profile: contract_review
  fallback_chain:
  - provider: codex
    model: GPT-5.4
    reasoning_effort: medium
  - provider: local-openai
    model: gpt-5.4
    reasoning_effort: low
runtime:
  memory_namespace: memory/legal-agent
  permission_profile: default_open_profile
docs:
  quickstart: docs/quickstart.md
  user_guide: docs/user-guide.md
  trainer_guide: docs/trainer-guide.md
  faq: docs/faq.md
  examples: docs/examples.md
skills:
  layout: direct-local
  catalog: skills/catalog.yaml
  entries:
  - web-access
  - summarize
  - benos-memory-core
  - ontology
  - contract-upload-parse
  - clause-risk-highlight
  - document-ocr-parse
  - table-and-figure-extract
  - approval-form-collect
  - sign-request-create
  - sign-status-track
  - legal-faq-answerer
  - case-material-checklist
  - contract-version-compare
  - contract-summary
  - evidence-package-export
