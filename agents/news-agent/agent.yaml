  trainer_guide: docs/trainer-guide.md
  faq: docs/faq.md
  examples: docs/examples.md
skills:
  layout: direct-local
  catalog: skills/catalog.yaml
  entries:
  - web-access
  - summarize
  - benos-memory-core
  - ontology
  - rss-source-router
  - feed-subscription-manager
  - topic-monitor
  - keyword-watch
  - platform-content-reader
  - news-cluster-summarizer
  - daily-brief-generator
  - weekly-brief-generator
  - competitor-content-scan
  - content-publish-pipeline
  - article-knowledge-base-sync
  - multi-source-merge
