package:
  id: news-agent
  display_name: 资讯专业包
  language: zh-CN
  summary: 多源资讯归并、摘要、日报周报与发布准备
  install_mode: parallel_agent_package
  requires:
    platform_initialized: true
    docs_complete: true
  includes:
    - agent.yaml
    - soul.yaml
    - prompts/
    - skills/catalog.yaml
    - policies/default_open_profile.yaml
    - policies/restricted_profile.yaml
    - policies/high_risk_profile.yaml
    - docs/quickstart.md
    - docs/user-guide.md
    - docs/trainer-guide.md
    - docs/faq.md
    - docs/examples.md
    - docs/image-plan.md
  required_keys:
    - rsshub_token
    - cms_api_key
    - tavily_api_key
  supports:
    independent_install: true
    independent_enable: true
    independent_upgrade: true
    independent_offline: true
