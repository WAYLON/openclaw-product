package:
  id: stock-agent
  display_name: 股票专业包
  language: zh-CN
  summary: A 股研究辅助、风险提示、行情观察与研究摘要交付
  install_mode: parallel_agent_package
  requires:
    platform_initialized: true
    docs_complete: true
  includes:
    - agent.yaml
    - soul.yaml
    - prompts/
    - skills/catalog.yaml
    - policies/default_open_profile.yaml
    - policies/restricted_profile.yaml
    - policies/high_risk_profile.yaml
    - docs/quickstart.md
    - docs/user-guide.md
    - docs/trainer-guide.md
    - docs/faq.md
    - docs/examples.md
    - docs/image-plan.md
  # 当前专业包可先安装；外部研究增强与行情接入凭证按需初始化。
  required_keys: []
  supports:
    independent_install: true
    independent_enable: true
    independent_upgrade: true
    independent_offline: true
