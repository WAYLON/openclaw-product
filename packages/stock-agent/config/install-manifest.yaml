package:
  id: stock-agent
  display_name: 股票专业包
  language: zh-CN
  summary: A 股研究辅助、风险提示、行情观察与研究摘要交付
  install_mode: parallel_agent_package
  deployment_mode: hosted_only
  requires:
    platform_initialized: true
    docs_complete: true
  includes:
    - soul.yaml
    - AGENTS.md
    - IDENTITY.md
    - skills/
    - policies/default_open_profile.yaml
    - policies/restricted_profile.yaml
    - policies/high_risk_profile.yaml
    - docs/quickstart.md
    - docs/user-guide.md
    - docs/trainer-guide.md
    - docs/faq.md
    - docs/examples.md
    - docs/image-plan.md
  # 当前按线上托管模式交付，不做本地部署。
  required_keys:
    - name: TRADINGAGENTS_TOKEN
      scope: launchagent_env
      required: true
      purpose: TradingAgents hosted API 调用凭证
  supports:
    independent_install: true
    independent_enable: true
    independent_upgrade: true
    independent_offline: false
