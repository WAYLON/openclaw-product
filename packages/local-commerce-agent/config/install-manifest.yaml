package:
  id: local-commerce-agent
  display_name: 电商本地生活专业包
  language: zh-CN
  summary: 商品运营、活动内容、客户标签、预约到店与经营复盘
  install_mode: parallel_agent_package
  requires:
    platform_initialized: true
    docs_complete: true
  includes:
    - agent.yaml
    - soul.yaml
    - prompts/
    - skills/catalog.yaml
    - policies/default_open_profile.yaml
    - policies/restricted_profile.yaml
    - policies/high_risk_profile.yaml
    - docs/quickstart.md
    - docs/user-guide.md
    - docs/trainer-guide.md
    - docs/faq.md
    - docs/examples.md
    - docs/image-plan.md
  required_keys:
    - cms_api_key
    - espocrm_api_key
    - chatwoot_api_key
    - calcom_api_key
    - n8n_api_key
  supports:
    independent_install: true
    independent_enable: true
    independent_upgrade: true
    independent_offline: true
