package:
  id: education-agent
  display_name: 教育专业包
  language: zh-CN
  summary: 备课、题目、讲义解析、语音课堂接入与老师讲解交付
  install_mode: parallel_agent_package
  deployment_mode: hosted_only
  requires:
    platform_initialized: true
    docs_complete: true
  includes:
    - soul.yaml
    - AGENTS.md
    - IDENTITY.md
    - skills/
    - policies/default_open_profile.yaml
    - policies/restricted_profile.yaml
    - policies/high_risk_profile.yaml
    - docs/quickstart.md
    - docs/user-guide.md
    - docs/trainer-guide.md
    - docs/faq.md
    - docs/examples.md
    - docs/image-plan.md
  # 当前按 hosted 模式交付，不做本地部署。
  required_keys:
    - name: OPENMAIC_ACCESS_CODE
      scope: openclaw_config
      required: true
      purpose: OpenMAIC hosted access code
  supports:
    independent_install: true
    independent_enable: true
    independent_upgrade: true
    independent_offline: false
